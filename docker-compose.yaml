name: litedns

services:
  litedns:
    image: ${LITEDNS_IMAGE:-litedns:latest}
    restart: unless-stopped
    ports:
      - "${LITEDNS_HTTP_PORT:-18080}:8080"
    environment:
      LITEDNS_MASTER_KEY: ${LITEDNS_MASTER_KEY:?LITEDNS_MASTER_KEY is required}
      LITEDNS_DB_PATH: /app/data/data.db
    volumes:
      - "${LITEDNS_CONFIG_PATH:-../../config.yaml}:/app/config.yaml:ro"
      - "${LITEDNS_DATA_DIR:-../../data}:/app/data"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
